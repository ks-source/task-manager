
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Controls Icons Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon-card:hover .icon-preview {
            transform: scale(1.1);
            color: #2563eb; /* blue-600 */
        }
        .icon-preview {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans text-slate-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold mb-3 text-slate-900">表示コントロール（拡大・縮小・リセット）</h1>
            <p class="text-slate-500">標準的で誰もが迷わない、洗練されたラインアイコンのセットです。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="icon-grid">
            <!-- Icons will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        コピーしました！
    </div>

    <script>
        // SVG Icon Data
        const icons = [
            {
                name: 'ズームイン（拡大）',
                description: '虫眼鏡＋プラスマーク。特定の期間や詳細なタスクをズームして確認する標準的なアクション。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"></circle>
  <path d="M21 21l-4.35-4.35"></path>
  <path d="M11 8v6"></path>
  <path d="M8 11h6"></path>
</svg>`
            },
            {
                name: 'ズームアウト（縮小）',
                description: '虫眼鏡＋マイナスマーク。プロジェクトの全体像や、より広い期間を俯瞰したい時のアクション。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"></circle>
  <path d="M21 21l-4.35-4.35"></path>
  <path d="M8 11h6"></path>
</svg>`
            },
            {
                name: 'フィット（リセット・全体表示）',
                description: '四隅のコーナーと中央のターゲット。拡大縮小された表示を「画面幅にぴったり合わせる（初期状態に戻す）」機能に最適です。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 8V4h4"></path>
  <path d="M20 8V4h-4"></path>
  <path d="M4 16v4h4"></path>
  <path d="M20 16v4h-4"></path>
  <rect x="9" y="9" width="6" height="6" rx="1"></rect>
</svg>`
            }
        ];

        const grid = document.getElementById('icon-grid');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function copyToClipboard(text, name) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`「${name}」のSVGをコピーしました！`);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showToast('コピーに失敗しました');
            });
        }

        // Render Icons
        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col items-center justify-between cursor-pointer hover:shadow-md hover:border-blue-200 transition-all group';
            card.onclick = () => copyToClipboard(icon.svg, icon.name);

            card.innerHTML = `
                <div class="icon-preview text-slate-700 w-16 h-16 mb-4">
                    ${icon.svg}
                </div>
                <div class="text-center w-full">
                    <h2 class="text-lg font-semibold text-slate-800 mb-1">${icon.name}</h2>
                    <p class="text-xs text-slate-400 mb-4 h-12">${icon.description}</p>
                </div>
                <button class="w-full py-2 bg-slate-100 group-hover:bg-blue-50 group-hover:text-blue-600 text-slate-600 text-sm font-medium rounded-lg transition-colors border border-slate-200 group-hover:border-blue-200">
                    コードをコピー
                </button>
            `;
            grid.appendChild(card);
        });
    </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
