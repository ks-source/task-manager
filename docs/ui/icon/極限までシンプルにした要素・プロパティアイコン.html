
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Property Icons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon-card:hover .icon-preview {
            color: #334155; /* slate-700 */
            transform: scale(1.05);
        }
        .transition-all {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans text-slate-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl font-semibold mb-3 text-slate-900 tracking-tight">Minimal Property Icons</h1>
            <p class="text-slate-500 text-sm">装飾を極限まで削ぎ落とし、最小限の線と図形だけで構成したミニマルなアイコンセットです。</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="icon-grid">
            <!-- Icons will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>コピーしました</span>
    </div>

    <script>
        // SVG Icon Data
        const icons = [
            {
                name: '編集 (Edit)',
                description: '紙（背景）をなくし、ペンのアウトラインのみに。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
</svg>`
            },
            {
                name: 'リンク (Link)',
                description: '交差する環をなくし、左右の半円と一本の線のみで表現。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3"></path>
  <path d="M9 17H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"></path>
  <line x1="8" y1="12" x2="16" y2="12"></line>
</svg>`
            },
            {
                name: 'Type (種類)',
                description: '図形を3つから2つ（四角と丸）に減らし、究極に抽象化。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="3" width="8" height="8" rx="1"></rect>
  <circle cx="16" cy="16" r="5"></circle>
</svg>`
            },
            {
                name: 'ID (識別子)',
                description: '顔や文字のメタファーを捨て、カードとバーコード（一本線）のみに。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="5" width="18" height="14" rx="2"></rect>
  <line x1="8" y1="12" x2="16" y2="12"></line>
</svg>`
            },
            {
                name: 'Label (ラベル)',
                description: '中の穴（丸）と線をなくし、純粋な「タグ」の外形のみ。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
</svg>`
            },
            {
                name: 'メモ (Note)',
                description: 'ドキュメントの折り目も省略し、ただの四角と横線のみに。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="3" width="16" height="18" rx="2"></rect>
  <line x1="8" y1="10" x2="16" y2="10"></line>
  <line x1="8" y1="14" x2="16" y2="14"></line>
</svg>`
            },
            {
                name: '未作成 (Uncreated)',
                description: '無駄のない、均等な破線の正方形。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 4"></rect>
</svg>`
            }
        ];

        const grid = document.getElementById('icon-grid');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast() {
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(showToast).catch(console.error);
        }

        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card bg-white rounded-lg border border-slate-200 p-6 flex flex-col items-center text-center cursor-pointer hover:border-slate-400 hover:shadow-sm transition-all group';
            card.onclick = () => copyToClipboard(icon.svg);

            card.innerHTML = `
                <div class="icon-preview text-slate-400 w-8 h-8 mb-4 transition-all">
                    ${icon.svg}
                </div>
                <h2 class="text-sm font-medium text-slate-700 mb-1">${icon.name}</h2>
                <p class="text-[10px] text-slate-400 leading-relaxed">${icon.description}</p>
            `;
            grid.appendChild(card);
        });
    </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
