
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search & Filter Icons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon-card:hover .icon-preview,
        .icon-card:hover .btn-preview {
            color: #7c3aed; /* violet-600 */
            border-color: #7c3aed;
        }
        .icon-card:hover .btn-preview-solid {
            background-color: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold mb-3 text-slate-900">「検索 ＆ フィルタリング」統合アイコン</h1>
            <p class="text-slate-500">「見つける（ルーペ）」と「絞り込む（ファネル・線）」の概念を組み合わせた、クリーンなデザインセットです。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="icon-grid">
            <!-- Icons will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>コピーしました！</span>
    </div>

    <script>
        // SVG Icon Data
        const icons = [
            {
                name: 'ファネル・レンズ (統合型)',
                description: 'ルーペのレンズの中に、ファネル（漏斗）を象徴する3本の線を配置。「検索結果を直接絞り込む」という意図を、最もミニマルに表現した王道デザインです。',
                btnText: '絞り込み検索',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"></circle>
  <line x1="16.65" y1="16.65" x2="22" y2="22"></line>
  <line x1="8" y1="8" x2="14" y2="8"></line>
  <line x1="9" y1="11" x2="13" y2="11"></line>
  <line x1="10.5" y1="14" x2="11.5" y2="14"></line>
</svg>`
            },
            {
                name: 'サーチ・アンド・スライダー (詳細設定)',
                description: '左にルーペ、右に設定用スライダーを配置。価格帯の調整や、複数条件のオン・オフを伴う「高度な検索（Advanced Search）」に最適です。',
                btnText: '詳細条件を指定',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="8" cy="11" r="5"></circle>
  <line x1="11.5" y1="14.5" x2="14" y2="17"></line>
  <line x1="16" y1="8" x2="22" y2="8"></line>
  <line x1="18" y1="6" x2="18" y2="10"></line>
  <line x1="16" y1="14" x2="22" y2="14"></line>
  <line x1="20" y1="12" x2="20" y2="16"></line>
</svg>`
            },
            {
                name: 'ソート・アンド・サーチ (条件リスト)',
                description: '左に小さなルーペ、右に長短のある線を配置。リストの「並び替え」や「カテゴリの指定」をしながら探す、ECサイトやデータテーブルなどで使いやすい形です。',
                btnText: '条件で探す',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="7" cy="9" r="4"></circle>
  <line x1="10" y1="12" x2="12" y2="14"></line>
  <line x1="14" y1="6" x2="22" y2="6"></line>
  <line x1="14" y1="10" x2="20" y2="10"></line>
  <line x1="14" y1="14" x2="18" y2="14"></line>
</svg>`
            }
        ];

        const grid = document.getElementById('icon-grid');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast(message) {
            toast.querySelector('span').textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function copyToClipboard(text, name) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`「${name}」をコピーしました`);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        // Render Icons
        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col items-center justify-between cursor-pointer hover:shadow-md hover:border-violet-300 transition-all group';
            card.onclick = () => copyToClipboard(icon.svg, icon.name);

            card.innerHTML = `
                <div class="icon-preview text-slate-700 w-16 h-16 mb-4 transition-all">
                    ${icon.svg}
                </div>
                <div class="text-center w-full mb-6">
                    <h2 class="text-lg font-semibold text-slate-800 mb-2">${icon.name}</h2>
                    <p class="text-xs text-slate-500 h-16 leading-relaxed">${icon.description}</p>
                </div>
                
                <div class="w-full space-y-3 mb-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider text-left mb-2">ボタンプレビュー</p>
                    <div class="btn-preview-solid bg-slate-800 text-white flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg font-medium text-sm transition-all w-full">
                        <div class="w-4 h-4">${icon.svg}</div>
                        ${icon.btnText}
                    </div>
                </div>

                <button class="w-full py-2 bg-slate-100 group-hover:bg-violet-50 group-hover:text-violet-700 text-slate-600 text-sm font-medium rounded-lg transition-colors border border-slate-200 group-hover:border-violet-200">
                    SVGコードをコピー
                </button>
            `;
            grid.appendChild(card);
        });
    </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
