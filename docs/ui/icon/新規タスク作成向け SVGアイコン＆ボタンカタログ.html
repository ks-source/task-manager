
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Task Icons Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon-card:hover .icon-preview,
        .icon-card:hover .btn-preview {
            color: #10b981; /* emerald-500 */
            border-color: #10b981;
        }
        .icon-card:hover .btn-preview-solid {
            background-color: #10b981;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold mb-3 text-slate-900">「➕️ 新規タスク作成」アイコン＆ボタンセット</h1>
            <p class="text-slate-500">クリックするとSVGアイコンのソースコードをコピーできます。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="icon-grid">
            <!-- Icons will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        コピーしました！
    </div>

    <script>
        // SVG Icon Data
        const icons = [
            {
                name: 'タスクドキュメント',
                description: 'チェックリスト＋プラスマーク。詳細な入力項目があるタスク作成フォームへの導線に最適です。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h5"></path>
  <path d="M14 2v6h6v4"></path>
  <path d="M8 12h8"></path>
  <path d="M8 16h4"></path>
  <path d="M19 15v6"></path>
  <path d="M16 18h6"></path>
</svg>`
            },
            {
                name: 'スクエア・プラス',
                description: '四角形＋プラスマーク。カンバンボード（Trello等）でのカード追加や、リストの末尾への追加に馴染みます。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="3" width="18" height="18" rx="2"></rect>
  <path d="M12 8v8"></path>
  <path d="M8 12h8"></path>
</svg>`
            },
            {
                name: 'サークル・プラス（FAB）',
                description: '円形＋プラスマーク。画面右下に固定配置するフローティングアクションボタン（FAB）など、汎用的に使えます。',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10"></circle>
  <path d="M12 8v8"></path>
  <path d="M8 12h8"></path>
</svg>`
            }
        ];

        const grid = document.getElementById('icon-grid');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2000);
        }

        function copyToClipboard(text, name) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`「${name}」のSVGをコピーしました！`);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showToast('コピーに失敗しました');
            });
        }

        // Render Icons
        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col items-center justify-between cursor-pointer hover:shadow-md hover:border-emerald-200 transition-all group';
            card.onclick = () => copyToClipboard(icon.svg, icon.name);

            card.innerHTML = `
                <div class="icon-preview text-slate-700 w-16 h-16 mb-4 transition-all">
                    ${icon.svg}
                </div>
                <div class="text-center w-full mb-6">
                    <h2 class="text-lg font-semibold text-slate-800 mb-2">${icon.name}</h2>
                    <p class="text-xs text-slate-500 h-12">${icon.description}</p>
                </div>
                
                <!-- ボタンUIのプレビュー -->
                <div class="w-full space-y-3 mb-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider text-left mb-2">ボタン実装プレビュー</p>
                    
                    <!-- Solid Button -->
                    <div class="btn-preview-solid bg-slate-800 text-white flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg font-medium text-sm transition-all w-full">
                        <div class="w-4 h-4">${icon.svg}</div>
                        新規タスク
                    </div>
                    
                    <!-- Outline Button -->
                    <div class="btn-preview border-2 border-slate-200 text-slate-600 flex items-center justify-center gap-2 py-2 px-4 rounded-lg font-medium text-sm transition-all w-full bg-white">
                        <div class="w-4 h-4">${icon.svg}</div>
                        タスクを追加
                    </div>
                </div>

                <button class="w-full py-2 bg-slate-100 group-hover:bg-emerald-50 group-hover:text-emerald-700 text-slate-600 text-sm font-medium rounded-lg transition-colors border border-slate-200 group-hover:border-emerald-200">
                    SVGコードをコピー
                </button>
            `;
            grid.appendChild(card);
        });
    </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
